<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#0b0b14"/>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a2a0a"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </radialGradient>
  </defs>
  <!-- Music note icon -->
  <g transform="translate(256,256)">
    <!-- Note head right -->
    <ellipse cx="90" cy="80" rx="52" ry="38" fill="#b8ff57" transform="rotate(-15 90 80)"/>
    <!-- Note head left -->
    <ellipse cx="-60" cy="120" rx="52" ry="38" fill="#b8ff57" transform="rotate(-15 -60 120)"/>
    <!-- Stem right -->
    <rect x="130" y="-100" width="16" height="180" rx="8" fill="#b8ff57"/>
    <!-- Stem left -->
    <rect x="-20" y="-60" width="16" height="180" rx="8" fill="#b8ff57"/>
    <!-- Beam top -->
    <rect x="-20" y="-104" width="166" height="20" rx="10" fill="#b8ff57"/>
    <!-- Beam middle -->
    <rect x="-20" y="-68" width="166" height="20" rx="10" fill="#b8ff57"/>
  </g>
</svg>
